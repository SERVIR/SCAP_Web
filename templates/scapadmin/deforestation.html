
<html>
<head>
    {% load static %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
            crossorigin="anonymous"></script>

    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/streamgraph.js"></script>
    <script src="https://code.highcharts.com/modules/series-label.js"></script>
    <script src="https://code.highcharts.com/modules/annotations.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
</head>

<body>


<div class="container-fluid">
    <div class="row h-100 ">
        <div><a href="{% url "emissions" %}">Emissions</a></div>
    <div  class="col-3">
            <b>Land Cover Datasets:</b><br>
                <ul class="lcf_list">
        {% for lc in lcs %}
            <li class="lc_list-item">{{ lc.lc_name }}
                <input type="checkbox" checked class="lc_list-item-checkbox"
                       value="{{ lc.lc_id }}" onchange="test()" name="lc"/>
            </li>
        {% endfor %}
    </ul>
</div>
        <div class="col-9" id="container1">
               <script type="text/javascript">
  new Highcharts.Chart({{chart|safe}});
</script>
        </div>
    </div>
</div>
<script src="{% static '/js/forestcover.js' %}"></script>

</body>
</html>
